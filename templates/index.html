<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Citi Bike Real-time Map</title>
    <!-- Leaflet CSS for the map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100vw; }
        .header { 
            position: absolute; 
            top: 10px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 1000; 
            background: white; 
            padding: 10px 20px; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <h3 style="margin-top: 5px; margin-bottom: 5px;">Citi Bike Real-time Monitor</h3>
        <p style="margin-top: 0; font-size: 14px; margin-bottom: 5px;">Select a station on the map to view real-time data</p>
        <a href="/history" style="display:inline-block; margin-top: 6px; padding: 6px 10px; background:#0f766e; color:white; text-decoration:none; border-radius:4px; font-size:13px; font-weight:bold;">
            View Spark Analysis
        </a>
    </div>
    
    <div id="map"></div>

    <!-- Leaflet Local JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize map centered roughly on Manhattan, NY
        var map = L.map('map').setView([40.75, -73.98], 13);
        
        // Add OpenStreetMap tiles (Free, no API key required)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        function formatFlag(value) {
            if (value === null || value === undefined) return "N/A";
            return value ? "true" : "false";
        }

        function formatCount(value) {
            if (value === null || value === undefined) return "N/A";
            return value;
        }

        function formatLocalTime(epochSeconds) {
            if (!epochSeconds) return "N/A";
            return new Date(epochSeconds * 1000).toLocaleString();
        }

        // Fetch selected stations and latest status from our Flask API
        fetch('/api/stations')
            .then(response => response.json())
            .then(stations => {
                stations.forEach(station => {
                    // Place a marker on the map for each station
                    var marker = L.marker([station.lat, station.lon]).addTo(map);
                    
                    // Create popup content with a link to the detail page
                    var popupContent = `
                        <div style="text-align: center;">
                            <b>${station.name}</b><br>
                            <span style="font-size: 12px; color: #555;">Lat: ${station.lat.toFixed(5)}, Lon: ${station.lon.toFixed(5)}</span><br>
                            <span style="font-size: 13px;">Capacity: ${station.capacity} bikes</span><br><br>

                            <span style="font-size: 12px;">is_installed: <b>${formatFlag(station.is_installed)}</b></span><br>
                            <span style="font-size: 12px;">is_renting: <b>${formatFlag(station.is_renting)}</b></span><br>
                            <span style="font-size: 12px;">is_returning: <b>${formatFlag(station.is_returning)}</b></span><br>
                            <span style="font-size: 12px;">num_bikes_available: <b>${formatCount(station.num_bikes_available)}</b></span><br>
                            <span style="font-size: 12px;">num_docks_available: <b>${formatCount(station.num_docks_available)}</b></span><br>
                            <span style="font-size: 12px;">num_vehicles_disabled: <b>${formatCount(station.num_vehicles_disabled)}</b></span><br>
                            <span style="font-size: 12px;">num_docks_disabled: <b>${formatCount(station.num_docks_disabled)}</b></span><br>
                            <span style="font-size: 11px; color: #555;">Latest DB update: ${formatLocalTime(station.latest_grab_time)}</span><br><br>

                            <a href="/station/${station.station_id}" target="_blank" style="display:inline-block; padding:6px 12px; background:#0066cc; color:white; text-decoration:none; border-radius:4px; font-weight:bold;">
                                View Real-time Chart
                            </a>
                        </div>
                    `;
                    marker.bindPopup(popupContent);
                });
            })
            .catch(error => console.error("Error loading stations:", error));
    </script>
</body>
</html>
