<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citi Bike Spark Analysis</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --panel: #ffffff;
            --ink: #1f2a44;
            --muted: #5f6f86;
            --line: #d9e2ef;
            --accent: #0f766e;
            --accent-strong: #0a5d57;
        }

        body {
            margin: 0;
            padding: 24px;
            font-family: "Segoe UI", Tahoma, sans-serif;
            color: var(--ink);
            background: radial-gradient(circle at 15% 10%, #eef7ff 0%, var(--bg) 45%, #edf6f3 100%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
        }

        .title {
            margin: 0;
            font-size: 30px;
            letter-spacing: 0.2px;
        }

        .subtitle {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 14px;
        }

        .actions a {
            display: inline-block;
            text-decoration: none;
            background: #334155;
            color: #fff;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
        }

        .actions a:hover {
            background: #1f2937;
        }

        .status {
            margin: 18px 0;
            background: var(--panel);
            border: 1px solid var(--line);
            border-left: 4px solid var(--accent);
            border-radius: 10px;
            padding: 12px 14px;
            color: #21495d;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 16px;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 14px rgba(21, 34, 52, 0.06);
        }

        .card h3 {
            margin: 0;
            padding: 12px 14px;
            background: linear-gradient(90deg, #f0faf8 0%, #eef4ff 100%);
            border-bottom: 1px solid var(--line);
            font-size: 16px;
        }

        .table-wrap {
            max-height: 320px;
            overflow: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th, td {
            border-bottom: 1px solid #e8eef6;
            text-align: left;
            padding: 8px 10px;
            white-space: nowrap;
        }

        th {
            background: #f6f9fd;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        .empty {
            padding: 14px;
            color: var(--muted);
            font-size: 14px;
        }

        .reload-btn {
            border: 0;
            border-radius: 8px;
            background: var(--accent);
            color: #fff;
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
        }

        .reload-btn:hover {
            background: var(--accent-strong);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div>
                <h1 class="title">Spark Analysis Dashboard</h1>
                <p class="subtitle">Historical ride analytics generated by spark_analysis.py</p>
            </div>
            <div class="actions">
                <a href="/">Back to Map</a>
                <button class="reload-btn" id="reload-btn">Reload</button>
            </div>
        </div>

        <div class="status" id="status">Loading Spark output...</div>
        <div class="grid" id="tables-grid"></div>
    </div>

    <script>
        const TABLE_TITLES = {
            overview: 'Overview',
            duration_stats: 'Duration Stats',
            rides_by_member_type: 'Member vs Casual',
            rides_by_rideable_type: 'Rideable Type Distribution',
            top_start_stations: 'Top Start Stations',
            top_end_stations: 'Top End Stations',
            hourly_distribution: 'Hourly Distribution',
            data_quality: 'Data Quality'
        };

        function escapeHtml(value) {
            const text = value === null || value === undefined ? '' : String(value);
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function renderTable(name, rows) {
            const card = document.createElement('section');
            card.className = 'card';

            const title = document.createElement('h3');
            title.textContent = TABLE_TITLES[name] || name;
            card.appendChild(title);

            if (!rows || rows.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'empty';
                empty.textContent = 'No rows found for this output table.';
                card.appendChild(empty);
                return card;
            }

            const columns = Object.keys(rows[0]);
            const wrap = document.createElement('div');
            wrap.className = 'table-wrap';

            let html = '<table><thead><tr>';
            columns.forEach(col => {
                html += `<th>${escapeHtml(col)}</th>`;
            });
            html += '</tr></thead><tbody>';

            rows.forEach(row => {
                html += '<tr>';
                columns.forEach(col => {
                    html += `<td>${escapeHtml(row[col])}</td>`;
                });
                html += '</tr>';
            });

            html += '</tbody></table>';
            wrap.innerHTML = html;
            card.appendChild(wrap);

            return card;
        }

        function renderPayload(payload) {
            const status = document.getElementById('status');
            const grid = document.getElementById('tables-grid');
            grid.innerHTML = '';

            if (!payload.available) {
                status.textContent = payload.message || 'Spark output not available.';
                return;
            }

            status.textContent = `${payload.message} Source folder: ${payload.output_dir}`;
            const tableEntries = Object.entries(payload.tables || {});

            tableEntries.forEach(([name, rows]) => {
                grid.appendChild(renderTable(name, rows));
            });
        }

        async function loadSparkData() {
            const status = document.getElementById('status');
            status.textContent = 'Loading Spark output...';
            try {
                const res = await fetch('/api/history-data');
                const payload = await res.json();
                renderPayload(payload);
            } catch (err) {
                status.textContent = 'Failed to load Spark output. Check server logs and output folders.';
                console.error(err);
            }
        }

        document.getElementById('reload-btn').addEventListener('click', loadSparkData);
        loadSparkData();
    </script>
</body>
</html>
